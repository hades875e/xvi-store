<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Voltix Gear</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-950 text-white min-h-screen">
    <div class="max-w-xl mx-auto px-4 py-20">
        <div class="rounded-[2rem] glass-card border border-slate-800 p-10 shadow-soft">
            <div class="text-center mb-8">
                <p class="section-title text-sm font-semibold tracking-[0.35em]">Create account</p>
                <h1 class="mt-3 text-4xl font-extrabold">Join Voltix Gear</h1>
                <p class="text-slate-400 mt-3">Register to save your cart, track orders, and access premium deals.</p>
            </div>
            <div id="authMessage" class="text-center mb-6"></div>
            <form id="registerForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Full name</label>
                    <input id="registerName" type="text" required placeholder="John Doe"
                        class="w-full rounded-3xl bg-slate-950 border border-slate-700 px-4 py-3 text-white focus:border-sky-400 focus:outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email address</label>
                    <input id="registerEmail" type="email" required placeholder="you@example.com"
                        class="w-full rounded-3xl bg-slate-950 border border-slate-700 px-4 py-3 text-white focus:border-sky-400 focus:outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input id="registerPassword" type="password" required placeholder="••••••••"
                        class="w-full rounded-3xl bg-slate-950 border border-slate-700 px-4 py-3 text-white focus:border-sky-400 focus:outline-none" />
                </div>
                <button type="submit"
                    class="w-full rounded-full btn-primary px-6 py-4 text-white font-bold hover:opacity-95 transition">Create
                    account</button>
            </form>
            <p class="mt-6 text-center text-slate-400">Already registered? <a href="login.html"
                    class="text-sky-300 hover:text-sky-400">Login</a></p>
        </div>
    </div>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
